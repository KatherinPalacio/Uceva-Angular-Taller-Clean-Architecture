<table class="table table-striped table-hover">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Género</th>
      <th>Año</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let movie of movies()">
      <td>{{ movie.id }}</td>
      <td>{{ movie.name }}</td>
      <td>{{ movie.genre }}</td>
      <td>{{ movie.year }}</td>
    </tr>
  </tbody>
</table>
